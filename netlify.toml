[build]
  # 静态前端目录
  publish = "public"
  # Netlify Functions 目录
  functions = "netlify/functions"

# 所有 /api/* 请求转发到 serverless function
# 其他请求走静态文件(public 目录)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA 回退: 非静态文件请求返回 index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
