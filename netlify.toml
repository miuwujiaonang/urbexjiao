# Netlify 前端部署配置
# 仅部署 public/ 目录作为静态站点

[build]
  publish = "public"
  command = ""

# SPA 回退(所有路由都返回 index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 构建时注入 Render 后端地址(在 Netlify 站点设置里配置环境变量 API_BASE_URL)
# 部署前请在 Netlify → Site settings → Environment variables 添加:
# API_BASE_URL = https://你的-render-域名.onrender.com
[build.environment]
  API_BASE_URL = ""
